<!doctype html>
<html lang="en">
<head>
  <script>(function(){try{var l=localStorage.getItem('preferred-lang');document.documentElement.setAttribute('data-lang',l||'en');}catch(e){document.documentElement.setAttribute('data-lang','en');}})()</script>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} &#8211; {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">

  <meta property="og:title" content="{{ page.title }}">
  <meta property="og:description" content="{{ page.description }}">
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">
  {% if page.cover %}<meta property="og:image" content="{{ site.url }}{{ page.cover }}">{% endif %}

  <link rel="canonical" href="{{ site.url }}{{ page.url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ site.url }}/feed.xml">
  <link rel="stylesheet" href="{{ site.url }}/assets/css/modern.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Source+Sans+3:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="{{ site.url }}/favicon.ico">

  <style>
    .photo-set-header {
      padding: 1.5rem 0 0.5rem;
      border-bottom: 1px solid var(--border-color, #eee);
      margin-bottom: 0.5rem;
    }

    .photo-set-header h1 {
      font-size: 1.6rem;
      margin: 0 0 0.25rem;
    }

    .photo-set-meta {
      font-size: 0.78rem;
      color: #888;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .photo-set-back {
      display: inline-block;
      font-size: 0.78rem;
      color: #888;
      text-decoration: none;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 1.25rem;
    }

    .photo-set-back:hover { color: #333; }

    .gallery {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2px;
      margin: 1rem -1rem;
    }

    .gallery-item {
      position: relative;
      overflow: hidden;
      background: #111;
      aspect-ratio: 3/2;
      cursor: pointer;
    }

    .gallery-item.wide {
      grid-column: span 2;
      aspect-ratio: 16/7;
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.3s ease;
    }

    .gallery-item:hover img { opacity: 0.75; }

    .gallery-caption {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0.75rem 1rem;
      background: linear-gradient(transparent, rgba(0,0,0,0.6));
      color: rgba(255,255,255,0.85);
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .gallery-item:hover .gallery-caption { opacity: 1; }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .lightbox.open { display: flex; }

    .lightbox-img {
      max-width: 92vw;
      max-height: 85vh;
      object-fit: contain;
      display: block;
      user-select: none;
    }

    .lightbox-caption {
      color: rgba(255,255,255,0.55);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 0.9rem;
    }

    .lightbox-close {
      position: absolute;
      top: 1.25rem;
      right: 1.5rem;
      color: rgba(255,255,255,0.55);
      font-size: 1.75rem;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0.25rem 0.5rem;
      transition: color 0.2s;
    }

    .lightbox-close:hover { color: #fff; }

    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.4);
      font-size: 2.5rem;
      cursor: pointer;
      background: none;
      border: none;
      padding: 1rem;
      transition: color 0.2s;
      user-select: none;
    }

    .lightbox-nav:hover { color: #fff; }
    .lightbox-prev { left: 0.5rem; }
    .lightbox-next { right: 0.5rem; }

    .lightbox-counter {
      position: absolute;
      top: 1.4rem;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.4);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
    }

    @media (max-width: 600px) {
      .gallery { grid-template-columns: 1fr; margin: 1rem 0; }
      .gallery-item.wide { grid-column: span 1; aspect-ratio: 3/2; }
    }
  </style>
</head>

<body>
  {% include modern-header.html %}

  <main class="main-content">
    <div class="page-card">

      <a class="photo-set-back" href="{{ site.url }}/photos/">&#8592; Photos</a>

      <div class="photo-set-header">
        <h1>{{ page.title }}</h1>
        <div class="photo-set-meta">{{ page.date | date: "%B %Y" }}</div>
      </div>

      <div class="gallery">
        {% for photo in page.photos %}
        <div class="gallery-item{% if photo.wide %} wide{% endif %}"
             data-src="{{ photo.src }}"
             data-caption="{{ photo.caption }}">
          <img src="{{ photo.src }}" alt="{{ photo.caption }}" loading="lazy">
          <div class="gallery-caption">{{ photo.caption }}</div>
        </div>
        {% endfor %}
      </div>

    </div>
  </main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lb-close">&#215;</button>
    <div class="lightbox-counter" id="lb-counter"></div>
    <button class="lightbox-nav lightbox-prev" id="lb-prev">&#8249;</button>
    <img class="lightbox-img" id="lb-img" src="" alt="">
    <div class="lightbox-caption" id="lb-caption"></div>
    <button class="lightbox-nav lightbox-next" id="lb-next">&#8250;</button>
  </div>

  {% include modern-footer.html %}

  <script src="{{ site.url }}/assets/js/lang-toggle.js"></script>

  <script>
  (function () {
    const items = Array.from(document.querySelectorAll('.gallery-item[data-src]'));
    const lightbox = document.getElementById('lightbox');
    const lbImg = document.getElementById('lb-img');
    const lbCaption = document.getElementById('lb-caption');
    const lbCounter = document.getElementById('lb-counter');
    let current = 0;

    function open(index) {
      current = index;
      lbImg.src = items[current].dataset.src;
      lbImg.alt = items[current].dataset.caption;
      lbCaption.textContent = items[current].dataset.caption;
      lbCounter.textContent = (current + 1) + ' / ' + items.length;
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function close() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }

    function prev() { open((current - 1 + items.length) % items.length); }
    function next() { open((current + 1) % items.length); }

    items.forEach((item, i) => item.addEventListener('click', () => open(i)));
    document.getElementById('lb-close').addEventListener('click', close);
    document.getElementById('lb-prev').addEventListener('click', prev);
    document.getElementById('lb-next').addEventListener('click', next);
    lightbox.addEventListener('click', (e) => { if (e.target === lightbox) close(); });

    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape') close();
      if (e.key === 'ArrowLeft') prev();
      if (e.key === 'ArrowRight') next();
    });
  })();
  </script>
</body>
</html>
