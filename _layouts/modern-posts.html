<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google Analytics GA4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-HG3W6HV0GT"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-HG3W6HV0GT');
  </script>

  <!-- Anti-flash: set language before CSS renders to avoid content flicker -->
  <script>(function(){try{var l=localStorage.getItem('preferred-lang');document.documentElement.setAttribute('data-lang',l||'en');}catch(e){document.documentElement.setAttribute('data-lang','en');}})()</script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} - {{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <!-- CSS -->
  <link rel="stylesheet" href="{{ site.url }}/assets/css/modern.css">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Source+Sans+3:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="{{ site.url }}/images/favicon.ico">
</head>
<body>
  {% include modern-header.html %}

  <main class="main-content">
    <div class="page-card">
      {{ content }}
    </div>
  </main>

  {% include modern-footer.html %}

  <!-- Language toggle -->
  <script src="{{ site.url }}/assets/js/lang-toggle.js"></script>
</body>
</html>
