<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 520" width="780" height="520" font-family="'Segoe UI', system-ui, sans-serif">

  <!-- Background -->
  <rect width="780" height="520" fill="#f9f9f9" rx="12"/>

  <!-- ── Nodes ─────────────────────────────────────────────── -->

  <!-- LLM -->
  <rect x="310" y="30" width="140" height="52" rx="10" fill="#e8d5f5" stroke="#9b59b6" stroke-width="2"/>
  <text x="380" y="61" text-anchor="middle" font-size="16" font-weight="600" fill="#6c3483">LLM</text>

  <!-- Agent -->
  <rect x="290" y="175" width="180" height="52" rx="10" fill="#d6eaf8" stroke="#2980b9" stroke-width="2"/>
  <text x="380" y="206" text-anchor="middle" font-size="16" font-weight="600" fill="#1a5276">agent</text>

  <!-- User -->
  <circle cx="90" cy="201" r="22" fill="#fdebd0" stroke="#e67e22" stroke-width="2"/>
  <text x="90" y="196" text-anchor="middle" font-size="18" fill="#e67e22">👤</text>
  <text x="90" y="213" text-anchor="middle" font-size="11" fill="#e67e22" font-weight="600">you</text>

  <!-- Tools box -->
  <rect x="570" y="155" width="170" height="95" rx="10" fill="#d5f5e3" stroke="#27ae60" stroke-width="2"/>
  <text x="655" y="180" text-anchor="middle" font-size="14" font-weight="600" fill="#1e8449">tools</text>
  <text x="655" y="200" text-anchor="middle" font-size="12" fill="#1e8449">read-file</text>
  <text x="655" y="218" text-anchor="middle" font-size="12" fill="#1e8449">delete-file</text>
  <text x="655" y="236" text-anchor="middle" font-size="12" fill="#1e8449">run-shell</text>

  <!-- MCP -->
  <rect x="80" y="355" width="130" height="52" rx="10" fill="#fdf2e9" stroke="#e67e22" stroke-width="2"/>
  <text x="145" y="386" text-anchor="middle" font-size="15" font-weight="600" fill="#a04000">MCP</text>

  <!-- Skills -->
  <rect x="310" y="340" width="220" height="72" rx="10" fill="#eaf4fb" stroke="#2471a3" stroke-width="2"/>
  <text x="420" y="365" text-anchor="middle" font-size="14" font-weight="600" fill="#1a5276">( skills )</text>
  <text x="420" y="384" text-anchor="middle" font-size="11" fill="#2471a3">a repeatable process for agent</text>
  <text x="420" y="400" text-anchor="middle" font-size="11" fill="#2471a3">composes tools + MCP calls</text>

  <!-- System -->
  <rect x="80" y="455" width="130" height="48" rx="10" fill="#e8f8f5" stroke="#1abc9c" stroke-width="2"/>
  <text x="145" y="484" text-anchor="middle" font-size="15" font-weight="600" fill="#0e6655">system</text>

  <!-- ── Arrows ───────────────────────────────────────────── -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#666"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2980b9"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#9b59b6"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#27ae60"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e67e22"/>
    </marker>
    <marker id="arrow-teal" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1abc9c"/>
    </marker>
  </defs>

  <!-- LLM ↔ Agent (interact) — two-headed -->
  <line x1="380" y1="82" x2="380" y2="173" stroke="#9b59b6" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <line x1="370" y1="175" x2="370" y2="83" stroke="#9b59b6" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <rect x="390" y="118" width="66" height="20" rx="4" fill="#f9f4fe"/>
  <text x="423" y="132" text-anchor="middle" font-size="11" fill="#9b59b6">interact</text>

  <!-- User → Agent (gives task) -->
  <line x1="113" y1="201" x2="288" y2="201" stroke="#e67e22" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <rect x="152" y="183" width="76" height="18" rx="4" fill="#fef9f3"/>
  <text x="190" y="196" text-anchor="middle" font-size="11" fill="#e67e22">gives task</text>

  <!-- Agent → Tools (use) -->
  <line x1="470" y1="201" x2="568" y2="201" stroke="#27ae60" stroke-width="2" marker-end="url(#arrow-green)"/>
  <rect x="490" y="183" width="36" height="18" rx="4" fill="#f4fdf6"/>
  <text x="508" y="196" text-anchor="middle" font-size="11" fill="#27ae60">use</text>

  <!-- Agent → MCP (discover) -->
  <path d="M 310 215 Q 200 260 210 355" stroke="#e67e22" stroke-width="2" fill="none" marker-end="url(#arrow-orange)"/>
  <rect x="172" y="266" width="66" height="18" rx="4" fill="#fef9f3"/>
  <text x="205" y="279" text-anchor="middle" font-size="11" fill="#e67e22">discover</text>

  <!-- Agent → Skills (execute) -->
  <line x1="390" y1="227" x2="400" y2="338" stroke="#2980b9" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="405" y="272" width="56" height="18" rx="4" fill="#eaf4fb"/>
  <text x="433" y="285" text-anchor="middle" font-size="11" fill="#2471a3">execute</text>

  <!-- Skills → MCP (can call) -->
  <line x1="310" y1="376" x2="212" y2="376" stroke="#2980b9" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-blue)"/>
  <rect x="230" y="358" width="60" height="18" rx="4" fill="#f0f8ff"/>
  <text x="260" y="371" text-anchor="middle" font-size="10" fill="#2471a3">can call</text>

  <!-- Skills → Tools (can use) -->
  <path d="M 530 355 Q 600 310 630 252" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arrow-green)"/>
  <rect x="572" y="298" width="58" height="18" rx="4" fill="#f4fdf6"/>
  <text x="601" y="311" text-anchor="middle" font-size="10" fill="#27ae60">can use</text>

  <!-- System → MCP (provide capability) -->
  <line x1="145" y1="455" x2="145" y2="409" stroke="#1abc9c" stroke-width="2" marker-end="url(#arrow-teal)"/>
  <rect x="148" y="426" width="86" height="18" rx="4" fill="#e8f8f5"/>
  <text x="191" y="439" text-anchor="middle" font-size="10" fill="#0e6655">provide capability</text>

</svg>
